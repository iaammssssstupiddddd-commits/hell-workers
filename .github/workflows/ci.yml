name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            g++ \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            mold \
            pkg-config \
            ripgrep
          mold --version
      - name: Cache Cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', '.cargo/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Verify Rust toolchain
        run: rustup show active-toolchain
      - name: Format
        run: cargo fmt --all --check
      - name: Compile check
        run: cargo check --workspace --locked
      - name: Compile profiling configuration
        run: cargo check -p bevy_app@0.1.0 --lib --no-default-features --features profiling --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Disallow Clippy suppressions
        run: |
          set +e
          rg -n '#\[(allow|expect)\(clippy::' crates --glob '*.rs'
          status=$?
          set -e
          case "$status" in
            1) ;;
            0) exit 1 ;;
            *) exit "$status" ;;
          esac
      - name: Test
        run: cargo test --workspace --locked
