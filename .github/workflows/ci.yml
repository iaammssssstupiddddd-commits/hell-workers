name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libudev-dev ripgrep
      - name: Verify Rust toolchain
        run: rustup show active-toolchain
      - name: Format
        run: cargo fmt --all --check
      - name: Compile check
        run: cargo check --workspace
      - name: Compile profiling configuration
        run: cargo check -p bevy_app@0.1.0 --lib --features profiling
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Disallow Clippy suppressions
        run: |
          set +e
          rg -n '#\[(allow|expect)\(clippy::' crates --glob '*.rs'
          status=$?
          set -e
          case "$status" in
            1) ;;
            0) exit 1 ;;
            *) exit "$status" ;;
          esac
      - name: Test
        run: cargo test --workspace
